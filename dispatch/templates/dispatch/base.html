{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Neura · Limassol Hotel{% endblock %}</title>
  <script src="{% static 'dispatch/plotly.min.js' %}"></script>
  <style>
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --border: #ececea;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --subtle: #9a9a9a;
      --accent: #1a1a1a;
      --green: #2f7d54;
      --green-soft: #e8f3ec;
      --amber: #b5740b;
      --amber-soft: #fbf2e0;
      --blue: #1f5fbf;
      --blue-soft: #e7eefb;
      --red: #b03a3a;
      --red-soft: #f8e8e8;
      --radius: 10px;
      --shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; }

    .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    aside {
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 24px 16px; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      padding: 0 8px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 8px; background: var(--accent);
      display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 13px;
      flex-shrink: 0;
    }
    .brand-name { font-weight: 600; letter-spacing: -.01em; }
    .brand-sub  { font-size: 11px; color: var(--subtle); }

    nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      color: var(--muted); text-decoration: none; font-weight: 500; margin-bottom: 2px;
    }
    nav a:hover { background: #f3f3f1; color: var(--text); }
    nav a.active { background: #f0efed; color: var(--text); }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .5; flex-shrink: 0; }
    .nav-section {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--subtle); padding: 16px 10px 6px;
    }

    main { padding: 32px 40px 64px; max-width: 1400px; }

    header.page {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 28px; gap: 24px; flex-wrap: wrap;
    }
    header.page h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -.015em; }
    header.page .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .btn {
      border: 1px solid var(--border); background: var(--surface);
      padding: 7px 14px; border-radius: 8px; font: inherit; font-size: 13px;
      color: var(--text); cursor: pointer; appearance: none;
    }
    .btn:hover { border-color: #d4d4d2; }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary:hover { background: #333; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow);
    }
    .section-head {
      display: flex; justify-content: space-between; align-items: baseline; margin: 0 0 14px;
    }
    .section-head h2 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -.005em; }
    .section-head .meta { font-size: 12px; color: var(--subtle); }

    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .kpi .label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .kpi .value { font-size: 26px; font-weight: 600; margin-top: 8px; letter-spacing: -.02em; }
    .kpi .delta {
      font-size: 12px; margin-top: 6px; display: inline-flex;
      align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px;
    }
    .delta.up      { background: var(--green-soft); color: var(--green); }
    .delta.down    { background: var(--red-soft);   color: var(--red); }
    .delta.neutral { background: #f1f1ef;            color: var(--muted); }

    .row-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 24px; }
    .row-1 { margin-bottom: 24px; }

    .chart-wrap    { height: 260px; position: relative; }
    .chart-wrap.sm { height: 200px; }

    .legend {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-size: 12px; color: var(--muted); margin-top: 10px;
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex-shrink: 0; }

    .timeline { display: flex; flex-direction: column; gap: 7px; }
    .timeline-row { display: grid; grid-template-columns: 48px 1fr; gap: 10px; align-items: center; font-size: 12px; }
    .timeline-row .day { color: var(--muted); font-weight: 500; }
    .bar { display: flex; height: 18px; border-radius: 4px; overflow: hidden; background: #ececea; }
    .bar > div { height: 100%; }
    .seg-grid  { background: var(--blue); }
    .seg-solar { background: var(--green); }
    .seg-disch { background: var(--amber); }
    .seg-idle  { background: #e5e5e3; }

    .tariff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tariff-col  { padding: 16px 18px; border-radius: 8px; border: 1px solid var(--border); }
    .tariff-col.active { border-color: var(--blue); border-width: 2px; }
    .tariff-name   { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .tariff-rates  { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.7; }
    .tariff-saving { font-size: 24px; font-weight: 700; color: var(--green); }
    .tariff-saving.worse { color: var(--amber); }
    .tariff-pct    { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .tariff-note   { font-size: 11px; color: var(--subtle); margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; line-height: 1.6; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { font-weight: 500; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafaf9; }
    td.num { font-family: ui-monospace, 'Cascadia Code', monospace; text-align: right; }
    th.num { text-align: right; }

    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .pill.charge    { background: var(--blue-soft);  color: var(--blue); }
    .pill.discharge { background: var(--amber-soft); color: var(--amber); }
    .pill.idle      { background: #f1f1ef;            color: var(--muted); }

    @media (max-width: 960px) {
      .app        { grid-template-columns: 1fr; }
      aside       { position: relative; height: auto; }
      .kpi-grid   { grid-template-columns: repeat(2, 1fr); }
      .row-2      { grid-template-columns: 1fr; }
      .tariff-grid{ grid-template-columns: 1fr; }
      main        { padding: 24px 20px; }
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <div class="brand-mark">N</div>
      <div>
        <div class="brand-name">Neura</div>
        <div class="brand-sub">Limassol Hotel</div>
      </div>
    </div>
    <nav>
      <a href="/reports/weekly/" {% if active_page == "overview" %}class="active"{% endif %}>
        <span class="nav-dot"></span> Overview
      </a>
      <div class="nav-section">Analysis</div>
      <a href="#"><span class="nav-dot"></span> Dispatch</a>
      <a href="#"><span class="nav-dot"></span> Reports</a>
      <a href="#"><span class="nav-dot"></span> Tariff</a>
      <div class="nav-section">System</div>
      <a href="#"><span class="nav-dot"></span> Battery · 400 kWh</a>
      <a href="#"><span class="nav-dot"></span> PV · 200 kWp</a>
      <a href="/reports/whatif/" {% if active_page == "whatif" %}class="active"{% endif %}>
        <span class="nav-dot"></span> Settings
      </a>
    </nav>
  </aside>

  <main>
    {% block main %}{% endblock %}
  </main>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
